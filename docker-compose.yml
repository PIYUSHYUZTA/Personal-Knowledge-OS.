version: '3.9'

services:
  # ============================================================================
  # PostgreSQL Database with pgvector support
  # ============================================================================
  postgres:
    image: pgvector/pgvector:${POSTGRES_VERSION:-pg16}
    container_name: pkos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pkos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pkos_password}
      POSTGRES_DB: ${POSTGRES_DB:-pkos_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkos_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pkos-network

  # ============================================================================
  # Neo4j Knowledge Graph (Phase 2 - Knowledge Relationship Mapping)
  # ============================================================================
  neo4j:
    image: neo4j:5.17-community
    container_name: pkos-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/pkos_password}
      NEO4JLABS_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1g
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"  # Bolt protocol
      - "${NEO4J_HTTP_PORT:-7474}:7474"  # HTTP port (Neo4j Browser)
      - "${NEO4J_HTTPS_PORT:-7473}:7473"  # HTTPS port
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - pkos-network

  # ============================================================================
  # Redis Cache Layer (Phase 3 - Query Caching & WebSocket State)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: pkos-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pkos-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pkos-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pkos_user}:${POSTGRES_PASSWORD:-pkos_password}@postgres:5432/${POSTGRES_DB:-pkos_db}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pkos-network

  # ============================================================================
  # React Frontend (Development)
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pkos-frontend
    command: npm run dev
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - pkos-network

  # ============================================================================
  # ChromaDB Vector Store (Optional, Fallback)
  # ============================================================================
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: pkos-chromadb
    volumes:
      - chromadb_data:/chroma/data
    ports:
      - "${CHROMADB_PORT:-8001}:8000"
    networks:
      - pkos-network
    profiles:
      - fallback

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  chromadb_data:
  redis_data:

networks:
  pkos-network:
    driver: bridge
